<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature de contrat — SFR Business</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:13px;background:#F3F4F6;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px}
.container{max-width:680px;width:100%}
.header{background:#1A1A2E;color:#fff;padding:14px 20px;border-radius:12px 12px 0 0;display:flex;align-items:center;gap:10px}
.sfr-logo{background:#E2001A;color:#fff;font-weight:500;font-size:12px;padding:3px 10px;border-radius:4px}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);padding:20px;margin-bottom:10px}
.card:last-child{border-radius:0 0 12px 12px}
.ctitle{font-size:10px;font-weight:500;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #F3F4F6}
.row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid #F9FAFB}
.row:last-child{border-bottom:none}
.rl{color:#6B7280}.rv{font-weight:500;text-align:right;max-width:60%}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.field label{font-size:11px;color:#6B7280;font-weight:500}
.req{color:#E2001A}
.field input{font-size:12px;padding:8px 10px;border:1px solid #D1D5DB;border-radius:6px;width:100%}
.field input:focus{outline:none;border-color:#E2001A;box-shadow:0 0 0 2px rgba(226,0,26,.1)}
.legal{background:#F9FAFB;border:1px solid #E5E7EB;border-radius:6px;padding:10px 12px;font-size:11px;color:#6B7280;line-height:1.7;margin-bottom:12px}
.legal b{color:#1A1A2E}
.consent-box{border:1px solid #D1D5DB;border-radius:8px;padding:12px;margin-bottom:8px}
.consent-box.required{border-color:#E2001A}
.chk{display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:12px;line-height:1.4}
.chk input{margin-top:2px;accent-color:#E2001A;width:13px;height:13px;flex-shrink:0}
.chk-desc{font-size:10px;color:#9CA3AF;margin-top:2px}
.btn-sign{background:#10B981;color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-top:8px}
.btn-sign:hover{background:#059669}
.btn-sign:disabled{background:#9CA3AF;cursor:not-allowed}
.alert{border-radius:6px;padding:10px 12px;font-size:11px;margin-bottom:12px;line-height:1.5}
.alert-warn{background:#FEF3C7;border:1px solid #FCD34D;color:#92400E}
.alert-ok{background:#D1FAE5;border:1px solid #A7F3D0;color:#065F46}
.alert-err{background:#FEE2E2;border:1px solid #FECACA;color:#991B1B}
.loading{text-align:center;padding:40px;color:#6B7280;font-size:13px}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #E5E7EB;border-top-color:#E2001A;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.success-screen{text-align:center;padding:40px 20px}
.success-icon{font-size:48px;margin-bottom:16px}
.success-title{font-size:20px;font-weight:500;margin-bottom:8px;color:#065F46}
.success-desc{font-size:13px;color:#6B7280;line-height:1.6}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="sfr-logo">SFR</div>
    <div>
      <div style="font-size:13px;font-weight:500">Signature de contrat</div>
      <div style="font-size:10px;color:rgba(255,255,255,.5)">SFR Business PRO — Outremer Telecom</div>
    </div>
  </div>
  <div id="app"><div class="loading"><div class="spinner"></div><br>Chargement de votre contrat...</div></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIGURATION SUPABASE — REMPLACER CES 2 VALEURS
// ═══════════════════════════════════════════════════════════
const SUPABASE_URL     = 'https://ghxbrzonqxkeuusjrjcb.supabase.co';
// Ex: 'https://abcdefghijklm.supabase.co'

const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoeGJyem9ucXhrZXV1c2pyamNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MzU2NjgsImV4cCI6MjA5MzQxMTY2OH0.DHoB0wNHe95ADUBZN83S78RfS7hV72jzthCa9E7Rt_Y';
// Ex: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
// ═══════════════════════════════════════════════════════════

const VALIDATE_FUNCTION_URL = SUPABASE_URL + '/functions/v1/sign-client';

const params = new URLSearchParams(window.location.search);
const token = params.get('token');

async function loadDossier(){
  if(!token){
    document.getElementById('app').innerHTML = `<div class="card"><div class="alert alert-err">Lien invalide ou expiré.</div></div>`;
    return;
  }
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/dossiers?token_client=eq.${token}&select=*`, {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
    });
    const data = await res.json();
    if(!data || data.length === 0){
      document.getElementById('app').innerHTML = `<div class="card"><div class="alert alert-err">Ce lien de signature est invalide ou a déjà été utilisé.</div></div>`;
      return;
    }
    const d = data[0];
    if(d.statut !== 'en_attente_signature_client'){
      document.getElementById('app').innerHTML = `<div class="card"><div class="alert alert-ok">✅ Ce contrat a déjà été signé. Merci !</div></div>`;
      return;
    }
    renderSign(d);
  } catch(e){
    document.getElementById('app').innerHTML = `<div class="card"><div class="alert alert-err">Erreur de chargement : ${e.message}</div></div>`;
  }
}

function renderSign(d){
  const offresLabel = Array.isArray(d.offres) ? d.offres.join(', ') : '—';
  const sigNom = d.sig_diff ? `${d.sig_prenom||''} ${d.sig_nom||''}`.trim() : `${d.rl_prenom||''} ${d.rl_nom||''}`.trim();
  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="ctitle">Récapitulatif de votre contrat</div>
      <div class="row"><span class="rl">Référence</span><span class="rv" style="font-family:monospace">${d.reference}</span></div>
      <div class="row"><span class="rl">Client</span><span class="rv">${d.rs||'—'}</span></div>
      <div class="row"><span class="rl">Territoire</span><span class="rv">${d.territoire||'—'}</span></div>
      <div class="row"><span class="rl">Type</span><span class="rv">${d.dossier||'—'}</span></div>
      <div class="row"><span class="rl">Offres</span><span class="rv">${offresLabel}</span></div>
      <div class="row"><span class="rl">SIRET</span><span class="rv">${d.siret||'—'}</span></div>
    </div>
    <div class="card">
      <div class="ctitle">Mentions légales RGPD</div>
      <div class="legal">Conformément aux lois et réglementations françaises et européennes en vigueur, nous vous informons qu'<b>OUTREMER TELECOM</b> collecte et traite vos données personnelles. Ces données sont nécessaires à l'exécution de votre contrat. Pour exercer vos droits, contactez : <b>donneespersonnelles@sfrcaraibe.com</b>. Retrouvez toutes les informations sur <b>www.sfrcaraibe.fr</b>.</div>
      <div class="consent-box required">
        <label class="chk"><input type="checkbox" id="cgv"><div>
          <div style="font-weight:500">Je déclare avoir pris connaissance et accepter les termes des conditions générales de souscription, des descriptifs d'offres et de tarifs et des conditions particulières <span class="req">*</span></div>
          <div class="chk-desc">Disponibles sur www.sfrcaraibe.fr</div>
        </div></label>
      </div>
      <div class="consent-box">
        <label class="chk"><input type="checkbox" id="mkt"><div>
          <div>J'accepte que les données collectées me concernant soient traitées dans le cadre d'opérations de marketing direct</div>
          <div class="chk-desc">Optionnel</div>
        </div></label>
      </div>
    </div>
    <div class="card">
      <div class="ctitle">Signature</div>
      <div class="alert alert-warn">Veuillez remplir les champs ci-dessous pour valider votre signature électronique.</div>
      <div class="field"><label>Fait à <span class="req">*</span></label><input type="text" id="fait_a" placeholder="${d.ville||'Ville'}"></div>
      <div class="field"><label>Qualité du signataire <span class="req">*</span></label><input type="text" id="qualite" placeholder="Ex : Gérant, Directeur Général..." value="${d.qualite_sig||''}"></div>
      <div style="font-size:11px;color:#9CA3AF;margin-bottom:12px">Signataire : <strong>${sigNom}</strong> — Date : <strong>${new Date().toLocaleDateString('fr-FR')}</strong></div>
      <button class="btn-sign" id="btn-sign" onclick="signer('${d.reference}')">Confirmer et signer mon contrat →</button>
    </div>`;
}

async function signer(reference){
  const cgv = document.getElementById('cgv')?.checked;
  const fait_a = document.getElementById('fait_a')?.value?.trim();
  const qualite = document.getElementById('qualite')?.value?.trim();
  if(!cgv){ alert('Vous devez accepter les conditions générales de souscription pour signer.'); return; }
  if(!fait_a){ alert('Veuillez indiquer la ville.'); return; }
  if(!qualite){ alert('Veuillez indiquer votre qualité (fonction).'); return; }

  document.getElementById('btn-sign').disabled = true;
  document.getElementById('btn-sign').textContent = 'Signature en cours...';

  try {
    const res = await fetch(VALIDATE_FUNCTION_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
      body: JSON.stringify({ token, reference, fait_a, qualite, consent_mkt: document.getElementById('mkt')?.checked })
    });
    const result = await res.json();
    if(!res.ok) throw new Error(result.error||'Erreur inconnue');
    document.getElementById('app').innerHTML = `
      <div class="card">
        <div class="success-screen">
          <div class="success-icon">✅</div>
          <div class="success-title">Contrat signé avec succès !</div>
          <div class="success-desc">Votre signature a bien été enregistrée.<br>Référence : <strong>${reference}</strong><br><br>Vous recevrez une confirmation par e-mail. Notre équipe back-office vous contactera prochainement pour la mise en service.</div>
        </div>
      </div>`;
  } catch(e){
    document.getElementById('btn-sign').disabled = false;
    document.getElementById('btn-sign').textContent = 'Confirmer et signer mon contrat →';
    alert('Erreur lors de la signature : ' + e.message);
  }
}

loadDossier();
</script>
</body>
</html>
