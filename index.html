<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contrat PRO SFR Business — Outremer Telecom</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E2001A;--dark:#1A1A2E;--mid:#2D2D44;
  --color-text-primary:#1A1A2E;--color-text-secondary:#4B5563;--color-text-tertiary:#9CA3AF;
  --color-background-primary:#FFFFFF;--color-background-secondary:#F9FAFB;--color-background-tertiary:#F3F4F6;
  --color-border-tertiary:rgba(0,0,0,0.08);--color-border-secondary:rgba(0,0,0,0.15);--color-border-primary:rgba(0,0,0,0.25);
  --color-background-info:#EFF6FF;--color-border-info:#BFDBFE;--color-text-info:#1E40AF;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --font-mono:'SF Mono','Fira Code',monospace;
  --border-radius-md:8px;--border-radius-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --color-text-primary:#F9FAFB;--color-text-secondary:#D1D5DB;--color-text-tertiary:#6B7280;
  --color-background-primary:#1F2937;--color-background-secondary:#111827;--color-background-tertiary:#0F172A;
  --color-border-tertiary:rgba(255,255,255,0.08);--color-border-secondary:rgba(255,255,255,0.15);--color-border-primary:rgba(255,255,255,0.25);
  --color-background-info:#1E3A5F;--color-border-info:#1D4ED8;--color-text-info:#93C5FD;
}}
body{font-family:var(--font-sans);font-size:13px;color:var(--color-text-primary);background:var(--color-background-tertiary);min-height:100vh}
.wrapper{max-width:980px;margin:0 auto;padding:16px}
.app{display:flex;flex-direction:column;border-radius:var(--border-radius-lg);overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.10)}
.hdr{background:var(--dark);color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.sfr-logo{background:var(--red);color:#fff;font-weight:500;font-size:12px;padding:3px 10px;border-radius:4px}
.hdr-badge{background:rgba(226,0,26,.2);color:#FCA5A5;font-size:10px;padding:2px 10px;border-radius:20px}
.hdr-wf{font-size:10px;background:rgba(16,185,129,.15);color:#6EE7B7;padding:2px 10px;border-radius:20px}
.prog-bar{background:var(--mid);padding:0 20px}
.steps-row{display:flex;align-items:center;overflow-x:auto;padding:8px 0;scrollbar-width:none;gap:0}
.steps-row::-webkit-scrollbar{display:none}
.sdot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;cursor:pointer;border:1.5px solid transparent;flex-shrink:0;transition:all .2s}
.sdot.done{background:#10B981;color:#fff;border-color:#10B981}
.sdot.active{background:var(--red);color:#fff;border-color:var(--red);box-shadow:0 0 0 3px rgba(226,0,26,.2)}
.sdot.todo{background:rgba(255,255,255,.08);color:rgba(255,255,255,.3);border-color:rgba(255,255,255,.1)}
.slbl{font-size:9px;color:rgba(255,255,255,.35);margin-left:4px;white-space:nowrap;max-width:62px;line-height:1.2}
.slbl.active{color:#fff;font-weight:500}.slbl.done{color:#6EE7B7}
.sconn{width:10px;height:1px;background:rgba(255,255,255,.1);margin:0 3px;flex-shrink:0}
.sconn.done{background:#10B981}
.body{display:flex;flex:1;background:var(--color-background-tertiary)}
.sidebar{width:185px;background:var(--color-background-secondary);border-right:0.5px solid var(--color-border-tertiary);padding:12px 10px;flex-shrink:0;display:flex;flex-direction:column;min-height:520px}
.sb-sec{font-size:9px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.7px;padding:4px 8px;margin-top:6px}
.sb-item{font-size:11px;color:var(--color-text-secondary);padding:5px 8px;border-radius:6px;cursor:pointer;transition:all .12s;border:0.5px solid transparent;margin-bottom:1px}
.sb-item:hover{background:var(--color-background-primary)}
.sb-item.active{background:var(--color-background-primary);color:var(--red);border-color:var(--color-border-secondary);font-weight:500}
.sb-item.done::after{content:" ✓";color:#10B981;font-size:10px}
.sb-meta{margin-top:auto;padding:10px 8px;border-top:0.5px solid var(--color-border-tertiary);font-size:11px;color:var(--color-text-tertiary);line-height:1.7}
.sb-meta b{color:var(--color-text-primary)}
.main{flex:1;padding:18px 20px;overflow-y:auto;max-height:580px}
.stag{font-size:10px;font-weight:500;color:var(--red);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.stitle{font-size:17px;font-weight:500;margin-bottom:3px}
.ssub{font-size:12px;color:var(--color-text-secondary);margin-bottom:16px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;margin-bottom:10px}
.ctitle{font-size:10px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:7px;border-bottom:0.5px solid var(--color-border-tertiary)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:11px;color:var(--color-text-secondary);font-weight:500}
.req{color:var(--red);margin-left:2px}
.field input,.field select,.field textarea{font-size:12px;padding:7px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);width:100%;transition:border .15s;font-family:var(--font-sans)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 2px rgba(226,0,26,.1)}
.field input.vok{border-color:#10B981}.field input.verr{border-color:#EF4444}
.hint{font-size:10px;color:var(--color-text-tertiary);line-height:1.4}
.errmsg{font-size:10px;color:#EF4444}
.rbtn{display:flex;align-items:center;gap:5px;padding:5px 11px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;font-size:11px;transition:all .12s;background:var(--color-background-primary);user-select:none}
.rbtn.sel{border-color:var(--red);background:rgba(226,0,26,.04);color:var(--red);font-weight:500}
.rbtn input{display:none}
.rgroup{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
.chk{display:flex;align-items:flex-start;gap:7px;font-size:12px;cursor:pointer;padding:6px 8px;border-radius:var(--border-radius-md);transition:background .1s;line-height:1.4}
.chk:hover{background:var(--color-background-secondary)}
.chk input[type=checkbox]{margin-top:2px;accent-color:var(--red);width:13px;height:13px;flex-shrink:0}
.chk input[type=checkbox]:disabled{opacity:.35;cursor:not-allowed}
.chk.disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
.cdesc{font-size:10px;color:var(--color-text-tertiary)}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dtbtn{padding:12px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);cursor:pointer;transition:all .18s;background:var(--color-background-primary)}
.dtbtn:hover{border-color:var(--red)}.dtbtn.sel{border-color:var(--red);background:rgba(226,0,26,.04)}
.dttitle{font-size:13px;font-weight:500}.dtsub{font-size:11px;color:var(--color-text-tertiary);margin-top:3px}
.terr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.tbtn{padding:16px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);cursor:pointer;text-align:center;transition:all .18s;background:var(--color-background-primary);font-size:13px;font-weight:500}
.tbtn:hover{border-color:var(--red)}.tbtn.sel{border-color:var(--red);background:rgba(226,0,26,.04);color:var(--red)}
.ocard{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);margin-bottom:8px;background:var(--color-background-primary);overflow:hidden}
.ocard.sel{border-color:var(--red)}
.ohead{padding:12px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .12s}
.ohead:hover{background:var(--color-background-secondary)}
.ocard.sel .ohead{background:rgba(226,0,26,.02)}
.oname{font-size:13px;font-weight:500}.odesc{font-size:11px;color:var(--color-text-secondary);margin-top:1px}
.ochk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--color-border-secondary);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;flex-shrink:0}
.ocard.sel .ochk{background:var(--red);border-color:var(--red)}
.obody{padding:14px;border-top:0.5px solid var(--color-border-tertiary)}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.bmob{background:#EFF6FF;color:#1D4ED8}.bfix{background:#F0FDF4;color:#15803D}
.breq{background:#FEF2F2;color:#B91C1C}.bspace{background:#F3F4F6;color:#374151;font-size:9px;padding:1px 5px;border-radius:4px}
.alert{border-radius:var(--border-radius-md);padding:9px 12px;font-size:11px;margin-bottom:10px;line-height:1.6}
.ainfo{background:var(--color-background-info);border:0.5px solid var(--color-border-info);color:var(--color-text-info)}
.awarn{background:#FEF3C7;border:0.5px solid #FCD34D;color:#92400E}
.alegal{background:#F5F3FF;border:0.5px solid #C4B5FD;color:#5B21B6}
.legal-box{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;font-size:11px;color:var(--color-text-secondary);line-height:1.7}
.legal-box b{color:var(--color-text-primary)}
.fogrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.fopt{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 10px;cursor:pointer;transition:all .15s}
.fopt:hover{border-color:var(--red)}.fopt.sel{border-color:var(--red);background:rgba(226,0,26,.03)}
.foname{font-size:11px;font-weight:500}.fotag{font-size:9px;color:var(--red);font-weight:500;background:rgba(226,0,26,.08);padding:1px 6px;border-radius:10px;display:inline-block;margin-bottom:3px}
.foprice{font-size:13px;font-weight:500;color:var(--red);margin-top:2px}.fodetail{font-size:10px;color:var(--color-text-tertiary)}
.lineblock{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:6px;overflow:hidden}
.linehead{padding:7px 12px;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.linebody{padding:12px;border-top:0.5px solid var(--color-border-tertiary)}
.avenant-block{background:#FEF3C7;border:0.5px solid #FCD34D;border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:10px}
.avenant-title{font-size:11px;font-weight:500;color:#92400E;margin-bottom:8px}
.ftable{width:100%;border-collapse:collapse;font-size:11px}
.ftable th{padding:5px 7px;text-align:left;font-weight:500;color:var(--color-text-secondary);background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary)}
.ftable td{padding:5px 7px;border:0.5px solid var(--color-border-tertiary);vertical-align:top;line-height:1.5}
.na{color:var(--color-text-tertiary);font-style:italic}.okc{color:#10B981;font-weight:500}
.disabled-opt{opacity:.35;cursor:not-allowed;pointer-events:none;text-decoration:line-through}
.sepa-id{font-family:var(--font-mono);font-size:13px;letter-spacing:2px;background:var(--color-background-secondary);padding:7px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary)}
.recap-sec{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:8px}
.rtitle{font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.rrow{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.rrow:last-child{border-bottom:none}
.rl{color:var(--color-text-secondary)}.rv{color:var(--color-text-primary);font-weight:500;text-align:right;max-width:58%}
.wfstep{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.wfstep:last-child{border-bottom:none}
.wfnum{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.wfnum.cur{background:rgba(226,0,26,.1);color:var(--red)}
.wfnum.wait{background:var(--color-background-secondary);color:var(--color-text-tertiary);border:0.5px solid var(--color-border-tertiary)}
.wftitle{font-size:12px;font-weight:500;margin-bottom:2px}.wfdesc{font-size:11px;color:var(--color-text-secondary)}
.consbanner{background:var(--dark);color:#fff;padding:10px 14px;border-radius:var(--border-radius-md);margin-bottom:12px;display:flex;align-items:center;gap:10px}
.consicon{background:var(--red);width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.pm{height:3px;background:var(--color-border-tertiary);border-radius:2px;margin-bottom:16px;overflow:hidden}
.pmf{height:100%;background:var(--red);border-radius:2px;transition:width .4s}
.ftr{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary)}
.btn{padding:8px 16px;border-radius:var(--border-radius-md);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:0.5px solid var(--color-border-secondary);font-family:var(--font-sans)}
.bprev{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.bprev:hover{background:var(--color-background-tertiary)}
.bnext{background:var(--red);color:#fff;border-color:var(--red)}.bnext:hover{background:#C00016}
.bsub{background:#10B981;color:#fff;border-color:#10B981;padding:9px 20px;font-size:13px}.bsub:hover{background:#059669}
</style>
</head>
<body>
<div class="wrapper">
<div class="app">
<div class="hdr">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="sfr-logo">SFR</div>
    <div><div style="font-size:12px;font-weight:500">Contrat PRO Business — v3</div><div style="font-size:10px;color:rgba(255,255,255,.4)">Outremer Telecom — 100% distance</div></div>
  </div>
  <div style="display:flex;gap:6px;align-items:center">
    <div class="hdr-wf">Workflow 2 signatures</div>
    <div class="hdr-badge" id="sbadge">Étape 1 / 11</div>
  </div>
</div>
<div class="prog-bar"><div class="steps-row" id="srow"></div></div>
<div class="body">
  <div class="sidebar" id="sb"><div class="sb-sec">Navigation</div></div>
  <div class="main" id="main"></div>
</div>
<div class="ftr">
  <div style="font-size:11px;color:var(--color-text-tertiary)">Champs <span style="color:var(--red)">*</span> obligatoires</div>
  <div style="display:flex;gap:6px">
    <button class="btn bprev" id="bprev" onclick="nav(-1)">← Précédent</button>
    <button class="btn bnext" id="bnext" onclick="nav(1)">Suivant →</button>
  </div>
</div>
</div>
</div>

<script>
const STEPS=[
  {id:'territoire',s:'Territoire'},{id:'titulaire',s:'Titulaire'},{id:'intervenants',s:'Intervenants'},
  {id:'facturation',s:'Facturation'},{id:'offres',s:'Offres'},{id:'portabilite',s:'Portabilité'},
  {id:'annuaire',s:'Annuaire'},{id:'pieces',s:'Pièces'},{id:'sepa',s:'SEPA'},
  {id:'recap',s:'Récapitulatif'},{id:'conseiller',s:'Conseiller'}
];

const D={
  territoire:'',dossier:'',avenant:'',
  rs:'',siret:'',ape:'',rue:'',bat:'',cp:'',ville:'',tel:'',email:'',
  rl_civ:'',rl_nom:'',rl_prenom:'',rl_fn:'',rl_fix:'',rl_mob:'',rl_email:'',
  sig_diff:false,sig_civ:'',sig_nom:'',sig_prenom:'',sig_fn:'',sig_fix:'',sig_mob:'',sig_email:'',
  gf_nom:'',gf_prenom:'',gf_fn:'',gf_mob:'',gf_fix:'',gf_email:'',
  ic_nom:'',ic_prenom:'',ic_fn:'',ic_mob:'',ic_fix:'',ic_email:'',
  fact_soc:'',fact_svc:'',fact_rue:'',fact_lieu:'',fact_compl:'',fact_bat:'',fact_cp:'',fact_ville:'',
  offres:[],
  mob_lines:[{f:'',formule:'',terminal:'',prix:'',avt:'',avl:'',_open:true}],
  carre_lines:[{g10:false,g50:false,mod:'',prix:''}],
  box_elig:'',box_offre:'',box_tv:false,box_team:false,box_avt:'',box_av_c:'',box_av_l:'',box_av_cm:'',
  fibre_type:'',fibre_elig:'',fibre_offre:'',fibre_civ:'',fibre_nom:'',fibre_prenom:'',
  fibre_contact:'',fibre_vendeur:'',fibre_rue:'',fibre_bat:'',fibre_esc:'',fibre_commune:'',fibre_cp:'',fibre_email:'',
  fibre_multitv:false,fibre_secours:'',fibre_rep:false,fibre_rep_email:'',
  fibre_av_c:'',fibre_av_l:'',fibre_av_cm:'',
  b4g_elig:'',b4g_liv:false,
  port:false,port_num:'',port_rio:'',port_op:'',port_date:'',
  ann_rouge:false,ann_prosp:false,ann_inv:false,ann_inc:false,ann_init:false,ann_email:'',ann_ins:false,
  pj_statut:'',
  iban:'',bic:'',rcs:'',
  consent_cgv:false,consent_mkt:false,fait_a:'',qualite:'',
  cons_code:'',cons_nom:'',cons_email:'',cons_valid:false,
  bo_email:'backoffice@outremer-telecom.fr'
};

let cur=0;const done=new Set();
const ref='OTK'+Math.floor(Math.random()*9000000+1000000);

function num(v,mx){return v.replace(/\D/g,'').slice(0,mx);}
function vSIRET(v){return /^\d{14}$/.test(v.replace(/\s/g,''));}
function vAPE(v){return /^\d{4}[A-Za-z]$/.test(v);}
function vEmail(v){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);}
function vIBAN(v){const c=v.replace(/\s/g,'');return /^[A-Z]{2}\d{25}$/.test(c);}
function vBIC(v){return /^[A-Z]{6}[A-Z0-9]{2}([A-Z0-9]{3})?$/i.test(v);}
function isAv(){return D.dossier==='Avenant';}

function lv(id,fn,msg){
  const el=document.getElementById(id);if(!el)return;
  const chk=()=>{const ok=fn(el.value);el.classList.toggle('vok',ok&&el.value.length>0);el.classList.toggle('verr',!ok&&el.value.length>0);let em=el.parentElement.querySelector('.errmsg');if(!ok&&el.value.length>0){if(!em){em=document.createElement('div');em.className='errmsg';el.parentElement.appendChild(em);}em.textContent=msg;}else if(em)em.remove();};
  el.addEventListener('blur',chk);el.addEventListener('input',()=>{if(el.classList.contains('verr'))chk();});
}
function B(id,key,t){const el=document.getElementById(id);if(!el)return;el.value=D[key]||'';const s=()=>{D[key]=t?t(el.value):el.value;};el.addEventListener('input',s);el.addEventListener('change',s);}
function BC(id,key,cb){const el=document.getElementById(id);if(!el)return;el.checked=!!D[key];el.addEventListener('change',()=>{D[key]=el.checked;if(cb)cb();});}

function renderSteps(){
  const row=document.getElementById('srow'),sb=document.getElementById('sb');
  row.innerHTML='';sb.querySelectorAll('.sb-item').forEach(e=>e.remove());
  STEPS.forEach((s,i)=>{
    const isDone=done.has(i),isActive=i===cur,cls=isDone?'done':isActive?'active':'todo';
    row.innerHTML+=`<div class="sdot ${cls}" onclick="jump(${i})" title="${s.s}">${isDone?'✓':i+1}</div><span class="slbl ${cls}">${s.s}</span>${i<STEPS.length-1?`<div class="sconn ${isDone?'done':''}"></div>`:''}`;
    const el=document.createElement('div');el.className='sb-item'+(isActive?' active':isDone?' done':'');el.textContent=`${i+1}. ${s.s}`;el.onclick=()=>jump(i);
    sb.insertBefore(el,sb.querySelector('.sb-meta'));
  });
}

function renderMain(){
  const m=document.getElementById('main');
  const pct=Math.round((cur/(STEPS.length-1))*100);
  let h=`<div class="pm"><div class="pmf" style="width:${pct}%"></div></div>`;
  const id=STEPS[cur].id;
  if(id==='territoire')h+=rT();
  else if(id==='titulaire')h+=rTit();
  else if(id==='intervenants')h+=rInt();
  else if(id==='facturation')h+=rFact();
  else if(id==='offres')h+=rOff();
  else if(id==='portabilite')h+=rPort();
  else if(id==='annuaire')h+=rAnn();
  else if(id==='pieces')h+=rPJ();
  else if(id==='sepa')h+=rSEPA();
  else if(id==='recap')h+=rRecap();
  else if(id==='conseiller')h+=rCons();
  m.innerHTML=h;bindAll();
  document.getElementById('sbadge').textContent=`Étape ${cur+1} / ${STEPS.length}`;
  document.getElementById('bprev').style.display=cur===0?'none':'';
  document.getElementById('bnext').style.display=cur===STEPS.length-1?'none':'';
  const meta=document.querySelector('.sb-meta');
  if(meta)meta.innerHTML=`Réf. <b>${ref}</b><br>${D.territoire||'—'}<br>${D.dossier||'—'}`;
}

function jump(i){cur=i;renderSteps();renderMain();}
function nav(d){if(d===1)done.add(cur);cur=Math.max(0,Math.min(STEPS.length-1,cur+d));renderSteps();renderMain();document.getElementById('main').scrollTop=0;}

/* ── ÉTAPE 10 : Récapitulatif ── */

  <div class="recap-sec"><div class="rtitle">Signataire</div>
    <div class="rrow"><span class="rl">Identité</span><span class="rv">${D.sig_diff?[D.sig_civ,D.sig_prenom,D.sig_nom].filter(Boolean).join(' '):[D.rl_civ,D.rl_prenom,D.rl_nom].filter(Boolean).join(' ')||'—'}</span></div>
    <div class="rrow"><span class="rl">Fonction</span><span class="rv">${D.sig_diff?(D.sig_fn||'—'):(D.rl_fn||'—')}</span></div>
    <div class="rrow"><span class="rl">E-mail signature</span><span class="rv" style="color:var(--red);font-weight:500">${sigEmail}</span></div>
  </div>
  <div class="recap-sec"><div class="rtitle">Offres souscrites</div>

      let d='';
      if(o==='mobile')D.mob_lines.forEach((ln,i)=>{if(ln.f)d+=`<div class="rrow"><span class="rl">Ligne ${i+1}</span><span class="rv">${ln.f.toUpperCase()} · ${ln.formule||'—'}${ln.terminal?' · '+ln.terminal:''}</span></div>`;});
      if(o==='box'&&D.box_offre)d+=`<div class="rrow"><span class="rl">BOX</span><span class="rv">${D.box_offre==='300'?'4G PRO 300 Go — 44,99 €/mois':'4G/5G PRO 500 Go — 74,99 €/mois'}</span></div>`;
      if(o==='fibre'&&D.fibre_offre)d+=`<div class="rrow"><span class="rl">Fibre</span><span class="rv">${D.fibre_offre}</span></div>`;
      if(o==='box4g')d+=`<div class="rrow"><span class="rl">Box 4G</span><span class="rv">17,00 € HT/mois</span></div>`;

    }).join(''):`<div style="font-size:11px;color:#EF4444">Aucune offre sélectionnée</div>`}
  </div>
  <div class="recap-sec"><div class="rtitle">SEPA</div>
    <div class="rrow"><span class="rl">IBAN</span><span class="rv" style="font-family:var(--font-mono);font-size:10px">${D.iban||'—'}</span></div>
    <div class="rrow"><span class="rl">BIC</span><span class="rv" style="font-family:var(--font-mono)">${D.bic||'—'}</span></div>
  </div>
  <div class="card"><div class="ctitle">Mentions légales RGPD</div>
    <div class="legal-box">Conformément aux lois et réglementations françaises et européennes en vigueur, nous vous informons qu'<b>OUTREMER TELECOM</b> collecte et traite vos données personnelles. Ces données sont nécessaires à l'exécution de votre contrat et elles sont traitées et transmises aux sociétés de notre Groupe, ainsi qu'à nos prestataires, pour la gestion de votre compte et votre information sur vos services. Elles peuvent faire l'objet d'un transfert hors UE et sont conservées pour la durée de la fourniture des Services et/ou de la finalité des traitements spécifiques. Pour exercer vos droits (accès, limitation, rectification, effacement, opposition et portabilité), envoyez un courrier à : <b>Outremer Telecom, Service Clients — Données Personnelles, ZI La Jambette, CS 90013, 97282 Le Lamentin Cedex</b>, ou par courriel à <b>donneespersonnelles@sfrcaraibe.com</b>, ou via votre espace client. Retrouvez toutes les informations sur <b>www.sfrcaraibe.fr</b>.</div>
  </div>
  <div class="card"><div class="ctitle">Consentements</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="border:0.5px solid var(--red);border-radius:var(--border-radius-md);padding:12px">
        <label class="chk" style="align-items:flex-start"><input type="checkbox" id="fcgv" ${D.consent_cgv?'checked':''}><div>
          <div style="font-weight:500">Je déclare avoir pris connaissance et accepter les termes des conditions générales de souscription, des descriptifs d'offres et de tarifs et des conditions particulières <span class="req">*</span></div>
          <div class="cdesc">Remis par l'agent ou disponibles sur le site www.sfrcaraibe.fr</div>
        </div></label>
      </div>
      <div style="border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:12px">
        <label class="chk" style="align-items:flex-start"><input type="checkbox" id="fmkt" ${D.consent_mkt?'checked':''}><div>
          <div>J'accepte que les données collectées me concernant soient traitées dans le cadre d'opérations de marketing direct</div>
          <div class="cdesc">Optionnel — Opposition possible à tout moment</div>
        </div></label>
      </div>
    </div>
  </div>
  <div class="card"><div class="ctitle">Signature du client</div>
    <div class="g2">
      <div class="field"><label>Fait à <span class="req">*</span></label><input type="text" id="ffaita" placeholder="${D.ville||'Ville'}" value="${D.fait_a}"></div>
      <div class="field"><label>Le</label><input type="text" value="${new Date().toLocaleDateString('fr-FR')}" readonly style="background:var(--color-background-secondary);color:var(--color-text-tertiary)"><div class="hint">Horodaté automatiquement</div></div>
      <div class="field full"><label>Qualité du signataire <span class="req">*</span></label><input type="text" id="fqualite" placeholder="Ex : Gérant, Directeur Général, Président..." value="${D.qualite}"><div class="hint">Précédée de la mention « lu et approuvé » — requise pour la validité juridique</div></div>
    </div>
    <div class="alert ainfo" style="margin-top:10px">
      Le lien de signature électronique sera envoyé à : <b>${sigEmail}</b><br>
      <span style="font-size:10px">${D.sig_diff?'E-mail du signataire (différent du représentant légal)':'E-mail du représentant légal'}</span>
    </div>
  </div>
  <div class="card"><div class="ctitle">Processus de validation — 100% distance</div>
    <div class="wfstep"><div class="wfnum cur">1</div><div><div class="wftitle">Envoi du lien de signature au client</div><div class="wfdesc">Un lien de signature sécurisé est envoyé par e-mail à <b>${sigEmail}</b>. Le client consulte le récapitulatif complet, accepte les CGS, saisit sa qualité et signe électroniquement.</div></div></div>
    <div class="wfstep"><div class="wfnum wait">2</div><div><div class="wftitle">Notification au conseiller</div><div class="wfdesc">Dès la signature client validée, une notification est envoyée automatiquement à l'e-mail du conseiller.</div></div></div>
    <div class="wfstep"><div class="wfnum wait">3</div><div><div class="wftitle">Validation et signature du conseiller</div><div class="wfdesc">Le conseiller accède à la section réservée (Étape 11), renseigne son code, saisit son e-mail et appose sa signature. Cette étape engage sa responsabilité professionnelle.</div></div></div>
    <div class="wfstep"><div class="wfnum wait">4</div><div><div class="wftitle">Transmission au back-office</div><div class="wfdesc">Le dossier complet — données + pièces justificatives + 2 signatures — est transmis automatiquement au back-office. Client et conseiller reçoivent chacun un exemplaire PDF par e-mail.</div></div></div>
  </div>
  <div style="display:flex;justify-content:center;margin-top:14px">
    <button class="btn bsub" onclick="alert('Lien de signature envoyé à ${sigEmail}\\nLe client recevra le formulaire à signer par e-mail.')">Envoyer le lien de signature au client →</button>
  </div>`;
}

/* ── ÉTAPE 11 : Conseiller ── */
function rCons(){
  return `<div class="stag">Étape 11 — Zone réservée</div><div class="stitle">Section conseiller</div><div class="ssub">Accès exclusif au conseiller SFR Business — verrouillé côté client</div>
  <div class="consbanner"><div class="consicon">C</div><div style="flex:1"><div style="font-size:12px;font-weight:500">Zone sécurisée conseiller</div><div style="font-size:10px;color:rgba(255,255,255,.5)">Non modifiable par le client — processus 100% distance</div></div><div style="font-size:10px;background:rgba(255,255,255,.1);padding:3px 9px;border-radius:20px;color:rgba(255,255,255,.7)">Verrouillé client</div></div>
  <div class="card"><div class="ctitle">Identification du conseiller</div><div class="g2">
    <div class="field"><label>Code conseiller <span class="req">*</span></label><input type="text" id="fconscode" maxlength="8" value="${D.cons_code}"><div class="hint">Code interne SFR Business</div></div>
    <div class="field"><label>Segment</label><div class="rgroup" style="margin-top:4px"><label class="rbtn sel"><input type="radio" checked>D</label></div></div>
    <div class="field full"><label>Nom du conseiller <span class="req">*</span></label><input type="text" id="fconsnom" value="${D.cons_nom}"></div>
    <div class="field full"><label>E-mail du conseiller <span class="req">*</span></label><input type="email" id="fconsemail" value="${D.cons_email}" placeholder="conseiller@sfr-business.fr"><div class="hint">Utilisé pour la notification de signature client et l'envoi de l'exemplaire final</div></div>
  </div></div>
  <div class="card"><div class="ctitle">Transmission back-office</div>
    <div class="field"><label>E-mail back-office <span class="req">*</span></label><input type="email" id="fbomail" value="${D.bo_email}"><div class="hint">Adresse par défaut — modifiable si nécessaire</div></div>
  </div>
  <div class="card"><div class="ctitle">Récapitulatif dossier</div><div style="font-size:12px">
    <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid var(--color-border-tertiary)"><span style="color:var(--color-text-secondary)">Référence</span><span style="font-family:var(--font-mono);font-weight:500">${ref}</span></div>
    <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid var(--color-border-tertiary)"><span style="color:var(--color-text-secondary)">Titulaire</span><span style="font-weight:500">${D.rs||'—'}</span></div>
    <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:0.5px solid var(--color-border-tertiary)"><span style="color:var(--color-text-secondary)">Territoire</span><span style="font-weight:500">${D.territoire||'—'}</span></div>
    <div style="display:flex;justify-content:space-between;padding:4px 0"><span style="color:var(--color-text-secondary)">Offres</span><span style="font-weight:500;text-align:right">${D.offres.length?D.offres.join(' · '):'—'}</span></div>
  </div></div>
  <div class="card"><div class="ctitle">Commentaires internes</div><textarea style="width:100%;height:80px;resize:vertical;font-family:var(--font-sans)" placeholder="Notes internes, conditions particulières..."></textarea></div>
  <div class="card" style="border-color:var(--color-border-warning)"><div class="ctitle">Cachet et signature conseiller</div>
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:18px;text-align:center;margin-bottom:12px;border:1px dashed var(--color-border-secondary)">
      <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px">Zone signature et cachet numérique</div>
      <div style="font-size:12px;color:var(--color-text-secondary)">Précédé de la mention « lu et approuvé » — Qualité du signataire</div>
    </div>
    <label class="chk"><input type="checkbox" id="fconsvalid" ${D.cons_valid?'checked':''}><div>
      <div style="font-weight:500">Je valide ce dossier et certifie l'exactitude des informations <span class="req">*</span></div>
      <div class="cdesc">Cette validation engage ma responsabilité en tant que conseiller SFR Business. Le dossier sera transmis au back-office à la suite de cette validation.</div>
    </div></label>
    <div style="margin-top:12px;display:flex;justify-content:flex-end">
      <button class="btn bsub" onclick="doSubmit()">Valider et transmettre au back-office →</button>
    </div>
  </div>`;
}

/* ── BINDINGS ── */
function bindAll(){
  const Bx=(id,key,t)=>{const el=document.getElementById(id);if(!el)return;el.value=D[key]||'';const s=()=>{D[key]=t?t(el.value):el.value;};el.addEventListener('input',s);el.addEventListener('change',s);};
  const BCx=(id,key,cb)=>{const el=document.getElementById(id);if(!el)return;el.checked=!!D[key];el.addEventListener('change',()=>{D[key]=el.checked;if(cb)cb();});};

  Bx('fav','avenant');
  Bx('frs','rs',v=>v.toUpperCase());Bx('fsiret','siret');Bx('fape','ape',v=>v.toUpperCase());
  Bx('frue','rue');Bx('fbat','bat');Bx('fville','ville');Bx('ftel','tel',v=>num(v,10));Bx('femail','email');
  const cpEl=document.getElementById('fcp');
  if(cpEl){cpEl.value=D.cp||'';cpEl.addEventListener('input',e=>{D.cp=num(e.target.value,5);e.target.value=D.cp;});}

  Bx('frlnom','rl_nom',v=>v.toUpperCase());Bx('frlprenom','rl_prenom');Bx('frlfn','rl_fn');
  Bx('frlfix','rl_fix',v=>num(v,10));Bx('frlmob','rl_mob',v=>num(v,10));Bx('frlemail','rl_email');
  BCx('fsigdiff','sig_diff',()=>renderMain());
  Bx('fsignom','sig_nom',v=>v.toUpperCase());Bx('fsigprenom','sig_prenom');Bx('fsigfn','sig_fn');
  Bx('fsigfix','sig_fix',v=>num(v,10));Bx('fsigmob','sig_mob',v=>num(v,10));Bx('fsigemail','sig_email');
  ['gf','ic'].forEach(p=>{['nom','prenom','fn','mob','fix','email'].forEach(f=>{const isN=f==='mob'||f==='fix';Bx(`f${p}${f}`,`${p}_${f}`,isN?v=>num(v,10):f==='nom'?v=>v.toUpperCase():null);});});

  /* Facturation — pré-remplissage corrigé : lecture directe des valeurs D */
  const ffactsoc=document.getElementById('ffactsoc');if(ffactsoc){ffactsoc.value=D.fact_soc||D.rs;ffactsoc.addEventListener('input',()=>{D.fact_soc=ffactsoc.value;});}
  Bx('ffactsvc','fact_svc');
  const ffactrue=document.getElementById('ffactrue');if(ffactrue){ffactrue.value=D.fact_rue||D.rue;ffactrue.addEventListener('input',()=>{D.fact_rue=ffactrue.value;});}
  Bx('ffactlieu','fact_lieu');Bx('ffactcompl','fact_compl');
  const ffactbat=document.getElementById('ffactbat');if(ffactbat){ffactbat.value=D.fact_bat||D.bat;ffactbat.addEventListener('input',()=>{D.fact_bat=ffactbat.value;});}
  const ffactcp=document.getElementById('ffactcp');if(ffactcp){ffactcp.value=D.fact_cp||D.cp;ffactcp.addEventListener('input',e=>{D.fact_cp=num(e.target.value,5);e.target.value=D.fact_cp;});}
  const ffactville=document.getElementById('ffactville');if(ffactville){ffactville.value=D.fact_ville||D.ville;ffactville.addEventListener('input',()=>{D.fact_ville=ffactville.value;});}

  Bx('fboxelig','box_elig');BCx('fboxtv','box_tv');BCx('fboxteam','box_team');
  Bx('ffibelig','fibre_elig');Bx('ffibnom','fibre_nom');Bx('ffibprenom','fibre_prenom');
  Bx('ffibcontact','fibre_contact',v=>num(v,10));Bx('ffibvendeur','fibre_vendeur');
  Bx('ffibrue','fibre_rue');Bx('ffibbat','fibre_bat');Bx('ffibesc','fibre_esc');
  Bx('ffibcommune','fibre_commune');Bx('ffibcp','fibre_cp');Bx('ffibemail','fibre_email');
  Bx('ffibsec','fibre_secours',v=>num(v,10));
  BCx('ffibmtv','fibre_multitv');BCx('ffibbrep','fibre_rep',()=>renderMain());Bx('ffibrepemail','fibre_rep_email');
  Bx('fb4gelig','b4g_elig');BCx('fb4gliv','b4g_liv');
  BCx('fport','port',()=>renderMain());
  Bx('fportnum','port_num',v=>num(v,10));Bx('fportrio','port_rio');Bx('fportop','port_op');Bx('fportdate','port_date');
  BCx('fannrouge','ann_rouge');BCx('fannprosp','ann_prosp');BCx('fanninv','ann_inv');BCx('fanninc','ann_inc');BCx('fanninit','ann_init');Bx('fannemail','ann_email');BCx('fanninsc','ann_ins');
  const pjs=document.getElementById('fpjstatut');if(pjs)pjs.addEventListener('change',()=>{D.pj_statut=pjs.value;renderMain();});
  Bx('fseparcs','rcs');
  const ibanEl=document.getElementById('fiban');
  if(ibanEl){
    ibanEl.value=D.iban;
    ibanEl.addEventListener('input',e=>{
      let v=e.target.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(0,27);
      D.iban=v;e.target.value=v;
    });
  }
  Bx('fbic','bic',v=>v.toUpperCase());
  BCx('fcgv','consent_cgv');BCx('fmkt','consent_mkt');
  Bx('ffaita','fait_a');Bx('fqualite','qualite');
  Bx('fconscode','cons_code');Bx('fconsnom','cons_nom');Bx('fconsemail','cons_email');Bx('fbomail','bo_email');BCx('fconsvalid','cons_valid');

  document.querySelectorAll('input[name="rlciv"]').forEach(r=>{r.addEventListener('change',()=>{D.rl_civ=r.value;document.querySelectorAll('[name="rlciv"]').forEach(x=>x.closest('.rbtn').classList.toggle('sel',x.value===r.value));});});
  document.querySelectorAll('input[name="sigciv"]').forEach(r=>{r.addEventListener('change',()=>{D.sig_civ=r.value;document.querySelectorAll('[name="sigciv"]').forEach(x=>x.closest('.rbtn').classList.toggle('sel',x.value===r.value));});});
  document.querySelectorAll('input[name="fibciv"]').forEach(r=>{r.addEventListener('change',()=>{D.fibre_civ=r.value;document.querySelectorAll('[name="fibciv"]').forEach(x=>x.closest('.rbtn').classList.toggle('sel',x.value===r.value));});});

  lv('fsiret',vSIRET,'SIRET invalide — 14 chiffres requis');
  lv('fape',vAPE,'Format invalide — ex : 6110Z');
  lv('femail',v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v),'Format e-mail invalide');
  lv('frlemail',v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v),'Format e-mail invalide');
  lv('fiban',vIBAN,'Format invalide — 2 lettres (FR) + 25 chiffres');
  lv('fbic',vBIC,'BIC invalide — 8 ou 11 caractères');
}

function toggleO(id){const i=D.offres.indexOf(id);if(i>-1)D.offres.splice(i,1);else D.offres.push(id);renderMain();}
function toggleLine(i){D.mob_lines[i]._open=!D.mob_lines[i]._open;renderMain();}
function addLine(){if(D.mob_lines.length<5){D.mob_lines.push({f:'',formule:'',terminal:'',prix:'',avt:'',avl:'',_open:true});renderMain();}}
function rmLine(e,i){e.stopPropagation();D.mob_lines.splice(i,1);renderMain();}
function setLF(i,k){D.mob_lines[i].f=k;renderMain();}
function setLFm(i,k){D.mob_lines[i].formule=k;renderMain();}
function setLAT(i,k){D.mob_lines[i].avt=k;renderMain();}
function addCL(){if(D.carre_lines.length<5){D.carre_lines.push({g10:false,g50:false,mod:'',prix:''});renderMain();}}
function setCA(i,v){D.carre_lines[i].g10=v==='10';D.carre_lines[i].g50=v==='50';}
function doSubmit(){
  if(!D.cons_valid){alert('Veuillez cocher la case de validation pour confirmer votre responsabilité.');return;}
  alert(`Dossier ${ref} transmis au back-office.\n\nDestination : ${D.bo_email}\nClient : ${D.sig_diff&&D.sig_email?D.sig_email:D.rl_email||'—'}\nConseiller : ${D.cons_email||'—'}\n\nLes trois parties recevront un exemplaire PDF par e-mail.`);
}

const sbEl=document.getElementById('sb');
const metaEl=document.createElement('div');metaEl.className='sb-meta';metaEl.innerHTML=`Réf. <b>${ref}</b><br>—<br>—`;sbEl.appendChild(metaEl);
renderSteps();renderMain();
</script>
